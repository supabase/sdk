name: Validate SDK Compliance (reusable)

on:
  workflow_call:
    inputs:
      file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Validate compliance file
        run: npm run validate-compliance -- "${{ github.workspace }}/${{ inputs.file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

name: SDK Compliance (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml
      language:
        description: SDK language for public API check — "swift", "javascript", "python", or "dart"
        type: string
        required: true
      sdk-ref:
        description: Ref to checkout from supabase/sdk for scripts (defaults to main; override only during pre-merge testing)
        type: string
        default: main
      griffe-packages:
        description: Space-separated griffe package names to dump (python only)
        type: string
        default: ""
      griffe-search-paths:
        description: Comma-separated search paths for griffe relative to repo root (python only)
        type: string
        default: ""
      entrypoint:
        description: TypeScript entrypoint file relative to SDK root (TypeScript SDKs only)
        type: string
        default: src/index.ts

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Validate compliance file
        run: npm run validate-compliance -- "${{ github.workspace }}/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

  check:
    name: Check public API against capability matrix
    runs-on: ${{ inputs.language == 'swift' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Validate language input
        run: |
          case "${{ inputs.language }}" in
            swift|javascript|python|dart) ;;
            *) echo "::error::Unsupported language '${{ inputs.language }}'. Supported values: swift, javascript, python, dart"; exit 1 ;;
          esac

      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _sdk-pr

      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: _sdk-base

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Cache SPM dependencies
        if: inputs.language == 'swift'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            _sdk-pr/.build/repositories
            _sdk-base/.build/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('_sdk-pr/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Install PR SDK dependencies (TypeScript)
        if: inputs.language == 'javascript'
        run: npm ci
        working-directory: _sdk-pr

      - name: Generate TypeDoc JSON — PR branch
        if: inputs.language == 'javascript'
        run: |
          npx --yes typedoc@0.27 \
            --json "$GITHUB_WORKSPACE/pr-raw.json" \
            --excludePrivate --excludeProtected \
            "${{ inputs.entrypoint }}"
        working-directory: _sdk-pr

      - name: Install base SDK dependencies (TypeScript)
        if: inputs.language == 'javascript'
        run: npm ci
        working-directory: _sdk-base

      - name: Generate TypeDoc JSON — base branch
        if: inputs.language == 'javascript'
        run: |
          npx --yes typedoc@0.27 \
            --json "$GITHUB_WORKSPACE/base-raw.json" \
            --excludePrivate --excludeProtected \
            "${{ inputs.entrypoint }}"
        working-directory: _sdk-base

      - name: Normalize TypeDoc output (TypeScript)
        if: inputs.language == 'javascript'
        run: |
          npm run --silent normalize-typedoc -- \
            "$GITHUB_WORKSPACE/pr-raw.json" "$GITHUB_WORKSPACE/pr-symbols.json"
          npm run --silent normalize-typedoc -- \
            "$GITHUB_WORKSPACE/base-raw.json" "$GITHUB_WORKSPACE/base-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install griffe
        if: inputs.language == 'python'
        run: pip install griffe

      - name: Dump griffe symbols
        if: inputs.language == 'python'
        run: |
          if [ -z "${{ inputs.griffe-packages }}" ]; then
            echo "::error::griffe-packages input is required when language is python"
            exit 1
          fi
          PKGS=$(echo "${{ inputs.griffe-packages }}" | tr ',' ' ' | tr -s ' ')
          for b in pr base; do
            SEARCH_FLAGS=""
            if [ -n "${{ inputs.griffe-search-paths }}" ]; then
              SEARCH_FLAGS=$(echo "${{ inputs.griffe-search-paths }}" | tr ',' '\n' \
                | while read -r p; do echo "--search $GITHUB_WORKSPACE/_sdk-$b/$p"; done \
                | tr '\n' ' ')
            fi
            python -m griffe dump $PKGS $SEARCH_FLAGS -o "$GITHUB_WORKSPACE/api-raw-$b.json"
          done

      - name: Normalize griffe symbols
        if: inputs.language == 'python'
        run: |
          for b in pr base; do
            npm run --silent normalize-griffe -- "$GITHUB_WORKSPACE/api-raw-$b.json" \
              --project-root "$GITHUB_WORKSPACE/_sdk-$b" \
              > "$GITHUB_WORKSPACE/$b-symbols.json"
          done
        working-directory: _sdk-spec/scripts/capability-matrix

      # The Dart parser is a small package:analyzer tool run directly with
      # `dart run`. It parses syntactically, so the target packages need no
      # `pub get` — only the Dart SDK and the tool's own dependencies.
      - name: Setup Dart SDK
        if: inputs.language == 'dart'
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Get Dart extractor dependencies
        if: inputs.language == 'dart'
        run: dart pub get
        working-directory: _sdk-spec/scripts/dart_symbol_extractor

      - name: Extract Dart symbols
        if: inputs.language == 'dart'
        run: |
          for b in pr base; do
            dart run bin/extract.dart "$GITHUB_WORKSPACE/_sdk-$b" \
              > "$GITHUB_WORKSPACE/$b-symbols.json"
          done
        working-directory: _sdk-spec/scripts/dart_symbol_extractor

      - name: Extract Swift symbol graphs
        if: inputs.language == 'swift'
        run: |
          for b in pr base; do
            cd "$GITHUB_WORKSPACE/_sdk-$b"
            # || true: test targets may fail to extract on CI runners; library targets land first
            swift package dump-symbol-graph \
              --minimum-access-level public \
              --skip-synthesized-members || true
            SGDIR=$(find .build -maxdepth 3 -type d -name "symbolgraph")
            NFILES=$(ls "$SGDIR"/*.symbols.json 2>/dev/null | wc -l | tr -d ' ')
            if [ "$NFILES" -eq 0 ]; then echo "::error::No symbol graphs emitted"; exit 1; fi
            jq -s '[.[] | .symbols[]]' "$SGDIR"/*.symbols.json \
              > "$GITHUB_WORKSPACE/$b-raw.json"
          done

      - name: Normalize Swift symbol graphs
        if: inputs.language == 'swift'
        run: |
          for b in pr base; do
            npm run --silent normalize-symbolgraph -- \
              "$GITHUB_WORKSPACE/$b-raw.json" "$GITHUB_WORKSPACE/_sdk-$b" \
              > "$GITHUB_WORKSPACE/$b-symbols.json"
          done
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Check new symbols against capability matrix
        run: |
          npm run check-api-symbols -- \
            "$GITHUB_WORKSPACE/pr-symbols.json" \
            "$GITHUB_WORKSPACE/base-symbols.json" \
            "$GITHUB_WORKSPACE/_sdk-pr/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

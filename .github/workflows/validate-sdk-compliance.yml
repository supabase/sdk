name: SDK Compliance (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml
      language:
        description: SDK language for public API check — must match a parse-<language> script (e.g. swift, javascript)
        type: string
        required: true
      sdk-ref:
        description: Ref to checkout from supabase/sdk for scripts (defaults to main; override only during pre-merge testing)
        type: string
        default: main

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Validate compliance file
        run: npm run validate-compliance -- "${{ github.workspace }}/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

  check:
    name: Check public API against capability matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _sdk-pr

      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: _sdk-base

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Setup Dart SDK
        if: inputs.language == 'dart'
        uses: dart-lang/setup-dart@v1

      - name: Activate dartdoc_json
        if: inputs.language == 'dart'
        run: dart pub global activate dartdoc_json

      - name: Generate Dart API surface (PR branch)
        if: inputs.language == 'dart'
        run: |
          find "$GITHUB_WORKSPACE/_sdk-pr" -name pubspec.yaml \
            -not -path "*/.*" -not -path "*/build/*" \
            | while read -r pubspec; do
                pkg=$(dirname "$pubspec")
                [ -d "$pkg/lib" ] || continue
                dart_files=$(find "$pkg/lib" -name "*.dart" \
                  -not -name "*.g.dart" -not -name "*.freezed.dart" -not -name "*.gr.dart")
                [ -n "$dart_files" ] || continue
                dart pub get --directory "$pkg"
                dartdoc_json $dart_files --root "$pkg" --output "$pkg/api.json"
              done
          api_files=$(find "$GITHUB_WORKSPACE/_sdk-pr" -name api.json | sort)
          if [ -n "$api_files" ]; then
            jq -s '[.[][]]' $api_files > "$GITHUB_WORKSPACE/pr-raw.json"
          else
            echo "[]" > "$GITHUB_WORKSPACE/pr-raw.json"
          fi
        env:
          PUB_CACHE: /tmp/pub-cache

      - name: Generate Dart API surface (base branch)
        if: inputs.language == 'dart'
        run: |
          find "$GITHUB_WORKSPACE/_sdk-base" -name pubspec.yaml \
            -not -path "*/.*" -not -path "*/build/*" \
            | while read -r pubspec; do
                pkg=$(dirname "$pubspec")
                [ -d "$pkg/lib" ] || continue
                dart_files=$(find "$pkg/lib" -name "*.dart" \
                  -not -name "*.g.dart" -not -name "*.freezed.dart" -not -name "*.gr.dart")
                [ -n "$dart_files" ] || continue
                dart pub get --directory "$pkg"
                dartdoc_json $dart_files --root "$pkg" --output "$pkg/api.json"
              done
          api_files=$(find "$GITHUB_WORKSPACE/_sdk-base" -name api.json | sort)
          if [ -n "$api_files" ]; then
            jq -s '[.[][]]' $api_files > "$GITHUB_WORKSPACE/base-raw.json"
          else
            echo "[]" > "$GITHUB_WORKSPACE/base-raw.json"
          fi
        env:
          PUB_CACHE: /tmp/pub-cache

      - name: Resolve parse command
        id: resolve
        run: |
          case "${{ inputs.language }}" in
            swift)      echo "cmd=parse-swift" >> "$GITHUB_OUTPUT" ;;
            javascript) echo "cmd=parse-ts"    >> "$GITHUB_OUTPUT" ;;
            dart)       echo "cmd=normalize-dartdoc" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported language '${{ inputs.language }}'. Supported values: swift, javascript, dart"; exit 1 ;;
          esac

      - name: Parse PR branch
        run: |
          if [ "${{ inputs.language }}" = "dart" ]; then
            npm run --silent normalize-dartdoc -- "$GITHUB_WORKSPACE/pr-raw.json" \
              > "$GITHUB_WORKSPACE/pr-symbols.json"
          else
            npm run --silent ${{ steps.resolve.outputs.cmd }} -- "$GITHUB_WORKSPACE/_sdk-pr" \
              > "$GITHUB_WORKSPACE/pr-symbols.json"
          fi
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Parse base branch
        run: |
          if [ "${{ inputs.language }}" = "dart" ]; then
            npm run --silent normalize-dartdoc -- "$GITHUB_WORKSPACE/base-raw.json" \
              > "$GITHUB_WORKSPACE/base-symbols.json"
          else
            npm run --silent ${{ steps.resolve.outputs.cmd }} -- "$GITHUB_WORKSPACE/_sdk-base" \
              > "$GITHUB_WORKSPACE/base-symbols.json"
          fi
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Check new symbols against capability matrix
        run: |
          npm run check-api-symbols -- \
            "$GITHUB_WORKSPACE/pr-symbols.json" \
            "$GITHUB_WORKSPACE/base-symbols.json" \
            "$GITHUB_WORKSPACE/_sdk-pr/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

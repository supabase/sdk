name: SDK Compliance (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml
      language:
        description: SDK language for public API check — "swift", "javascript", or "dart"
        type: string
        required: true
      sdk-ref:
        description: Ref to checkout from supabase/sdk for scripts (defaults to main; override only during pre-merge testing)
        type: string
        default: main

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Validate compliance file
        run: npm run validate-compliance -- "${{ github.workspace }}/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

  check:
    name: Check public API against capability matrix
    runs-on: ${{ inputs.language == 'swift' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _sdk-pr

      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: _sdk-base

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Cache SPM dependencies
        if: inputs.language == 'swift'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            _sdk-pr/.build/repositories
            _sdk-base/.build/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('_sdk-pr/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      # The Dart parser is a small package:analyzer tool run directly with
      # `dart run`. It parses syntactically, so the target packages need no
      # `pub get` — only the Dart SDK and the tool's own dependencies.
      - name: Setup Dart SDK
        if: inputs.language == 'dart'
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Get Dart extractor dependencies
        if: inputs.language == 'dart'
        run: dart pub get
        working-directory: _sdk-spec/scripts/dart_symbol_extractor

      - name: Extract symbol graphs — PR
        if: inputs.language == 'swift'
        run: |
          swift package dump-symbol-graph \
            --minimum-access-level public \
            --skip-synthesized-members \
            --output-directory "$GITHUB_WORKSPACE/_sg-pr"
          jq -s '[.[] | .symbols[]]' "$GITHUB_WORKSPACE/_sg-pr"/*.symbols.json \
            > "$GITHUB_WORKSPACE/pr-raw.json"
        working-directory: _sdk-pr

      - name: Extract symbol graphs — base
        if: inputs.language == 'swift'
        run: |
          swift package dump-symbol-graph \
            --minimum-access-level public \
            --skip-synthesized-members \
            --output-directory "$GITHUB_WORKSPACE/_sg-base"
          jq -s '[.[] | .symbols[]]' "$GITHUB_WORKSPACE/_sg-base"/*.symbols.json \
            > "$GITHUB_WORKSPACE/base-raw.json"
        working-directory: _sdk-base

      - name: Normalize symbol graphs — PR
        if: inputs.language == 'swift'
        run: |
          npm run --silent normalize-symbolgraph -- \
            "$GITHUB_WORKSPACE/pr-raw.json" "$GITHUB_WORKSPACE/_sdk-pr" \
            > "$GITHUB_WORKSPACE/pr-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Normalize symbol graphs — base
        if: inputs.language == 'swift'
        run: |
          npm run --silent normalize-symbolgraph -- \
            "$GITHUB_WORKSPACE/base-raw.json" "$GITHUB_WORKSPACE/_sdk-base" \
            > "$GITHUB_WORKSPACE/base-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Resolve parse command
        if: inputs.language != 'swift' && inputs.language != 'dart'
        id: resolve
        run: |
          case "${{ inputs.language }}" in
            javascript) echo "cmd=parse-ts" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported language '${{ inputs.language }}'. Supported values: swift, javascript, dart"; exit 1 ;;
          esac

      - name: Parse PR branch
        if: inputs.language != 'swift' && inputs.language != 'dart'
        run: |
          npm run --silent ${{ steps.resolve.outputs.cmd }} -- "$GITHUB_WORKSPACE/_sdk-pr" \
            > "$GITHUB_WORKSPACE/pr-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Parse base branch
        if: inputs.language != 'swift' && inputs.language != 'dart'
        run: |
          npm run --silent ${{ steps.resolve.outputs.cmd }} -- "$GITHUB_WORKSPACE/_sdk-base" \
            > "$GITHUB_WORKSPACE/base-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Parse PR and base branch (Dart)
        if: inputs.language == 'dart'
        run: |
          dart run bin/extract.dart "$GITHUB_WORKSPACE/_sdk-pr" \
            > "$GITHUB_WORKSPACE/pr-symbols.json"
          dart run bin/extract.dart "$GITHUB_WORKSPACE/_sdk-base" \
            > "$GITHUB_WORKSPACE/base-symbols.json"
        working-directory: _sdk-spec/scripts/dart_symbol_extractor

      - name: Check new symbols against capability matrix
        run: |
          npm run check-api-symbols -- \
            "$GITHUB_WORKSPACE/pr-symbols.json" \
            "$GITHUB_WORKSPACE/base-symbols.json" \
            "$GITHUB_WORKSPACE/_sdk-pr/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

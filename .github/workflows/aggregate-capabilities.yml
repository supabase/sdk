name: Aggregate SDK Compliance

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-swift-docs:
    name: Generate Swift TypeDoc JSON
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout supabase-swift
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supabase-community/supabase-swift
          path: supabase-swift
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install swift-docs dependencies
        run: npm ci
        working-directory: scripts/swift-docs

      - name: Generate TypeDoc JSON from supabase-swift
        run: |
          npx tsx src/index.ts \
            ../../supabase-swift \
            typedoc.json \
            supabase-swift-categories.json
        working-directory: scripts/swift-docs

      - name: Upload Swift TypeDoc artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: swift-typedoc
          path: scripts/swift-docs/typedoc.json

  aggregate-and-deploy:
    name: Aggregate compliance and deploy site
    needs: generate-swift-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: scripts/capability-matrix
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Aggregate compliance data from SDK repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run aggregate

      - name: Build site with compliance data
        run: npm run build-site -- ../../site/compliance.json

      - name: Download Swift TypeDoc artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: swift-typedoc
          path: site/swift

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

name: Check API Compliance (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml

jobs:
  check:
    name: Check public API against capability matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _sdk-pr

      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: _sdk-base

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Parse PR branch public API
        run: npm run parse-ts -- "$GITHUB_WORKSPACE/_sdk-pr" > "$GITHUB_WORKSPACE/pr-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Parse base branch public API
        run: npm run parse-ts -- "$GITHUB_WORKSPACE/_sdk-base" > "$GITHUB_WORKSPACE/base-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Check new symbols against capability matrix
        run: |
          npm run check-api-symbols -- \
            "$GITHUB_WORKSPACE/pr-symbols.json" \
            "$GITHUB_WORKSPACE/base-symbols.json" \
            "$GITHUB_WORKSPACE/_sdk-pr/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

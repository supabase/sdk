name: SDK Compliance — JavaScript (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml
      sdk-ref:
        description: Ref to checkout from supabase/sdk for scripts (defaults to main; override only during pre-merge testing)
        type: string
        default: main
      entrypoint:
        description: TypeScript entrypoint file relative to SDK root
        type: string
        default: src/index.ts

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/sdk/.github/actions/sdk-compliance-validate@main
        with:
          compliance-file: ${{ inputs.compliance-file }}
          sdk-ref: ${{ inputs.sdk-ref }}

  check:
    name: Check public API against capability matrix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/sdk/.github/actions/sdk-compliance-check-setup@main
        with:
          sdk-ref: ${{ inputs.sdk-ref }}

      - name: Generate TypeDoc JSON
        env:
          ENTRYPOINT: ${{ inputs.entrypoint }}
        run: |
          for b in pr base; do
            cd "$GITHUB_WORKSPACE/_sdk-$b"
            npm ci
            npx --yes typedoc@0.27 \
              --json "$GITHUB_WORKSPACE/$b-raw.json" \
              --excludePrivate --excludeProtected \
              "$ENTRYPOINT"
          done

      - name: Normalize TypeDoc output
        run: |
          for b in pr base; do
            npm run --silent normalize-typedoc -- \
              "$GITHUB_WORKSPACE/$b-raw.json" "$GITHUB_WORKSPACE/$b-symbols.json"
          done
        working-directory: _sdk-spec/scripts/capability-matrix

      - uses: supabase/sdk/.github/actions/sdk-compliance-check-symbols@main
        with:
          compliance-file: ${{ inputs.compliance-file }}

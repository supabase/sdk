name: SDK Compliance — JavaScript (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml
      sdk-ref:
        description: Ref to checkout from supabase/sdk for scripts (defaults to main; override only during pre-merge testing)
        type: string
        default: main
      build-command:
        description: Shell command run in each checked-out SDK root to emit TypeDoc spec.json files (the SDK owns how it builds)
        type: string
        required: true
      spec-glob:
        description: Glob (relative to the SDK root) matching the spec.json files produced by build-command
        type: string
        required: true

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/sdk/.github/actions/sdk-compliance-validate@main
        with:
          compliance-file: ${{ inputs.compliance-file }}
          sdk-ref: ${{ inputs.sdk-ref }}

  check:
    name: Check public API against capability matrix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: supabase/sdk/.github/actions/sdk-compliance-check-setup@main
        with:
          sdk-ref: ${{ inputs.sdk-ref }}

      # This workflow is build-agnostic: the SDK declares how to produce its
      # TypeDoc spec.json files via `build-command`, and where they land via
      # `spec-glob`. We run the command in each branch's checkout, collect the
      # emitted spec.json files, then normalize + merge them into one
      # ParseResult. TypeDoc emits repo-root-relative paths, so the merged
      # output stays unambiguous without any prefixing.
      - name: Generate and normalize TypeScript symbols
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
          SPEC_GLOB: ${{ inputs.spec-glob }}
        run: |
          set -euo pipefail
          [ -n "${BUILD_COMMAND:-}" ] || { echo "::error::build-command is required"; exit 1; }
          [ -n "${SPEC_GLOB:-}" ]     || { echo "::error::spec-glob is required"; exit 1; }
          for b in pr base; do
            ROOT="$GITHUB_WORKSPACE/_sdk-$b"
            # The SDK owns how it builds; we just run it and collect what it emits.
            ( cd "$ROOT" && eval "$BUILD_COMMAND" )
            INPUTS=()
            for f in "$ROOT"/$SPEC_GLOB; do
              [ -e "$f" ] || continue
              INPUTS+=("$f")
            done
            [ ${#INPUTS[@]} -gt 0 ] || { echo "::error::spec-glob '$SPEC_GLOB' matched no files under $ROOT"; exit 1; }
            ( cd "$GITHUB_WORKSPACE/_sdk-spec/scripts/capability-matrix" \
              && npm run --silent normalize-typedoc -- \
                   --out "$GITHUB_WORKSPACE/$b-symbols.json" "${INPUTS[@]}" )
          done

      - uses: supabase/sdk/.github/actions/sdk-compliance-check-symbols@main
        with:
          compliance-file: ${{ inputs.compliance-file }}

      - uses: supabase/sdk/.github/actions/sdk-compliance-check-drift@main
        with:
          compliance-file: ${{ inputs.compliance-file }}

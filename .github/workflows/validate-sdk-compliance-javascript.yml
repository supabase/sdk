name: SDK Compliance — JavaScript (reusable)

on:
  workflow_call:
    inputs:
      compliance-file:
        description: Path to sdk-compliance.yaml in the calling repo
        type: string
        default: sdk-compliance.yaml
      sdk-ref:
        description: Ref to checkout from supabase/sdk for scripts (defaults to main; override only during pre-merge testing)
        type: string
        default: main
      entrypoint:
        description: TypeScript entrypoint file relative to SDK root
        type: string
        default: src/index.ts

jobs:
  validate:
    name: Validate compliance file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Validate compliance file
        run: npm run validate-compliance -- "${{ github.workspace }}/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

  check:
    name: Check public API against capability matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _sdk-pr

      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: _sdk-base

      - name: Checkout capability spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: supabase/sdk
          ref: ${{ inputs.sdk-ref }}
          path: _sdk-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Install PR SDK dependencies
        run: npm ci
        working-directory: _sdk-pr

      - name: Generate TypeDoc JSON — PR branch
        run: |
          npx --yes typedoc@0.27 \
            --json "$GITHUB_WORKSPACE/pr-raw.json" \
            --excludePrivate --excludeProtected \
            "${{ inputs.entrypoint }}"
        working-directory: _sdk-pr

      - name: Install base SDK dependencies
        run: npm ci
        working-directory: _sdk-base

      - name: Generate TypeDoc JSON — base branch
        run: |
          npx --yes typedoc@0.27 \
            --json "$GITHUB_WORKSPACE/base-raw.json" \
            --excludePrivate --excludeProtected \
            "${{ inputs.entrypoint }}"
        working-directory: _sdk-base

      - name: Normalize TypeDoc output
        run: |
          npm run --silent normalize-typedoc -- \
            "$GITHUB_WORKSPACE/pr-raw.json" "$GITHUB_WORKSPACE/pr-symbols.json"
          npm run --silent normalize-typedoc -- \
            "$GITHUB_WORKSPACE/base-raw.json" "$GITHUB_WORKSPACE/base-symbols.json"
        working-directory: _sdk-spec/scripts/capability-matrix

      - name: Check new symbols against capability matrix
        run: |
          npm run check-api-symbols -- \
            "$GITHUB_WORKSPACE/pr-symbols.json" \
            "$GITHUB_WORKSPACE/base-symbols.json" \
            "$GITHUB_WORKSPACE/_sdk-pr/${{ inputs.compliance-file }}"
        working-directory: _sdk-spec/scripts/capability-matrix

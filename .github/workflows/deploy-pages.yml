name: Deploy capability matrix site

on:
  push:
    branches: [main]
    paths:
      - "capabilities/**"
      - "schema/**"
      - "scripts/capability-matrix/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: # allow manual trigger

# Required for GitHub Pages OIDC deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress deploys
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: scripts/capability-matrix

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build-site

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

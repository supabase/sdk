name: Set up SDK compliance public API check
description: Checks out the PR branch, base branch, and capability spec, then installs script dependencies.

inputs:
  sdk-ref:
    description: Ref to checkout from supabase/sdk for scripts
    default: main

runs:
  using: composite
  steps:
    - name: Checkout PR branch
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        path: _sdk-pr

    - name: Checkout base branch
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        path: _sdk-base

    - name: Checkout capability spec
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: supabase/sdk
        ref: ${{ inputs.sdk-ref }}
        path: _sdk-spec

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "22"

    - name: Install dependencies
      shell: bash
      run: npm ci
      working-directory: _sdk-spec/scripts/capability-matrix

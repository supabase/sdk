name: Validate SDK compliance file
description: Checks out the calling SDK repo and the capability spec, then validates the compliance file.

inputs:
  compliance-file:
    description: Path to sdk-compliance.yaml in the calling repo
    default: sdk-compliance.yaml
  sdk-ref:
    description: Ref to checkout from supabase/sdk for scripts
    default: main

runs:
  using: composite
  steps:
    - name: Checkout SDK repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Checkout capability spec
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: supabase/sdk
        ref: ${{ inputs.sdk-ref }}
        path: _sdk-spec

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "22"

    - name: Install dependencies
      shell: bash
      run: npm ci
      working-directory: _sdk-spec/scripts/capability-matrix

    - name: Validate compliance file
      shell: bash
      env:
        COMPLIANCE_FILE: ${{ inputs.compliance-file }}
      run: npm run validate-compliance -- "$GITHUB_WORKSPACE/$COMPLIANCE_FILE"
      working-directory: _sdk-spec/scripts/capability-matrix

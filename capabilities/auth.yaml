# yaml-language-server: $schema=../schema/capability-matrix.schema.json
area: auth
title: Authentication
description: User sign-in flows, session management, MFA, passkeys, identity linking, and admin operations.

features:

  # ── Sign-in / sign-up ────────────────────────────────────────────────────────

  - id: auth.sign_up
    name: Sign Up
    description: Register a new user with email or phone and password.
    group: sign-in
    sdks:
      javascript:
        status: implemented
        references:
          - repo: supabase/supabase-js
            path: packages/core/auth-js/src/GoTrueClient.ts
            symbols: [signUp]
      flutter:
        status: implemented
        references:
          - repo: supabase/supabase-flutter
            path: packages/gotrue/lib/src/gotrue_client.dart
            symbols: [signUp]
      python: { status: not_implemented }
      swift: { status: not_implemented }
      csharp: { status: not_implemented }
      go: { status: not_implemented }
      kotlin: { status: not_implemented }

  - id: auth.sign_in_with_password

# yaml-language-server: $schema=../schema/capability-matrix.schema.json
area: client
title: Client Initialization
description: Cross-cutting SupabaseClient configuration — third-party auth integration, custom fetch, session storage adapters, schema selection, and observability.
groups:
  - id: auth-integration
    title: Authentication Integration
  - id: session-management
    title: Session Management
  - id: request-config
    title: Request Configuration
  - id: observability
    title: Observability
features:
  - id: client.auth_integration.third_party_auth
    name: Third-Party Auth via Access Token Callback
    description: Provide an async accessToken callback at construction time to use an external auth provider (Auth0, Firebase, Cognito, etc.); disables Supabase Auth and injects the returned JWT into all downstream client requests.
    group: auth-integration
  - id: client.auth_integration.cross_client_token_sync
    name: Cross-Client Token Synchronization
    description: The client listens for auth state change events and automatically propagates the current JWT to Realtime, Storage, Functions, and PostgREST sub-clients so all requests stay authenticated without manual intervention.
    group: auth-integration
  - id: client.auth_integration.oauth_flow_type
    name: OAuth Flow Type Selection
    description: Choose between implicit and PKCE OAuth flows at construction time; PKCE is recommended for mobile apps and server-side rendering scenarios where the implicit flow is less secure.
    group: auth-integration
  - id: client.auth_integration.session_url_detection
    name: Session URL Detection Customization
    description: Configure whether — and how — the client detects an OAuth callback in the current URL; accepts a boolean or a custom predicate function to avoid conflicts with other OAuth providers in the same app.
    group: auth-integration
  - id: client.session_management.custom_storage
    name: Custom Session Storage Adapter
    description: Supply a storage adapter (getItem, setItem, removeItem) via auth.storage to persist the user session in environments without localStorage — such as React Native (AsyncStorage), Expo, or contexts requiring encrypted storage.
    group: session-management
  - id: client.session_management.persist_session
    name: Session Persistence Toggle
    description: Disable automatic session persistence so the session lives in memory only for the lifetime of the client instance (auth.persistSession option).
    group: session-management
  - id: client.session_management.auto_refresh_token
    name: Auto-Refresh Token Toggle
    description: Disable the SDK's background token refresh loop so the application manages token renewal explicitly (auth.autoRefreshToken option).
    group: session-management
  - id: client.session_management.storage_key
    name: Custom Auth Storage Key
    description: Override the default storage key used to persist the session (auth.storageKey) to prevent collisions when multiple independent Supabase clients share the same storage namespace.
    group: session-management
  - id: client.session_management.ssr_mode
    name: SSR Initialization Control
    description: Skip automatic auth initialization at construction time via auth.skipAutoInitialize to avoid race conditions in server-side rendering frameworks such as Next.js; initialization is triggered manually via auth.initialize().
    group: session-management
  - id: client.request_config.custom_fetch
    name: Global Custom Fetch
    description: Supply a custom fetch implementation at construction time; the client wraps it with automatic API key and Authorization header injection and propagates it to all sub-clients.
    group: request-config
  - id: client.request_config.global_headers
    name: Global Request Headers
    description: Attach extra HTTP headers to every request made by all sub-clients (PostgREST, Storage, Functions, Realtime) via the global.headers constructor option.
    group: request-config
  - id: client.request_config.schema_selection
    name: Default Schema Selection
    description: Set the default PostgreSQL schema for all PostgREST queries at construction time; must be a schema exposed by the PostgREST configuration.
    group: request-config
  - id: client.request_config.db_timeout
    name: Database Request Timeout
    description: Abort PostgREST requests that exceed a given duration in milliseconds set at construction time, implemented via an AbortController wrapping the PostgREST fetch.
    group: request-config
  - id: client.observability.trace_propagation
    name: OpenTelemetry Trace Propagation
    description: Inject W3C trace context headers (traceparent, tracestate, baggage) into requests to Supabase domains so server-side spans can be correlated with client-side traces; requires @opentelemetry/api and only sends headers to trusted Supabase hostnames.
    group: observability
  - id: client.observability.auth_debug
    name: Auth Debug Logging
    description: Enable verbose console logging of auth client internals — token refresh cycles, session storage reads/writes, and state transitions — via the auth.debug constructor option.
    group: observability

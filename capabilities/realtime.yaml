# yaml-language-server: $schema=../schema/capability-matrix.schema.json
area: realtime
title: Realtime
description: "Websocket client and channel subscriptions: Postgres changes, broadcast, and presence."
groups:
  - id: client
    title: Client
  - id: channel
    title: Channel
features:
  - id: realtime.channel
    name: Channel
    description: Creates (or reuses) a for the provided topic.
    group: client
  - id: realtime.connect
    name: Connect
    description: Connects the socket, unless already connected.
    group: client
  - id: realtime.connection_state
    name: Connection State
    description: Returns the current state of the socket.
    group: client
  - id: realtime.copy_bindings
    name: Copy Bindings
    description: Copy Bindings (no description in source).
    group: channel
  - id: realtime.disconnect
    name: Disconnect
    description: Disconnects the socket.
    group: client
  - id: realtime.endpoint_url
    name: Endpoint Url
    description: Returns the URL of the websocket.
    group: client
  - id: realtime.get_channels
    name: Get Channels
    description: Returns all created channels
    group: client
  - id: realtime.http_send
    name: Http Send
    description: Sends a broadcast message explicitly via REST API.
    group: channel
  - id: realtime.is_connected
    name: Is Connected
    description: Returns is the connection is open.
    group: client
  - id: realtime.is_connecting
    name: Is Connecting
    description: Returns if the connection is currently connecting.
    group: client
  - id: realtime.is_disconnecting
    name: Is Disconnecting
    description: Returns if the connection is currently disconnecting.
    group: client
  - id: realtime.on
    name: "On"
    description: Creates an event handler that listens to changes.
    group: channel
  - id: realtime.on_heartbeat
    name: On Heartbeat
    description: Sets a callback that receives lifecycle events for internal heartbeat messages. Useful for instrumenting connection health (e.g. sent/ok/timeout/disconnected).
    group: client
  - id: realtime.presence_state
    name: Presence State
    description: Returns the current presence state for this channel.
    group: channel
  - id: realtime.push
    name: Push
    description: Push out a message if the socket is connected.
    group: client
  - id: realtime.remove_all_channels
    name: Remove All Channels
    description: Unsubscribes, removes and tears down all channels
    group: client
  - id: realtime.remove_channel
    name: Remove Channel
    description: Unsubscribes, removes and tears down a single channel
    group: client
  - id: realtime.send
    name: Send
    description: Sends a message into the channel.
    group: channel
  - id: realtime.send_heartbeat
    name: Send Heartbeat
    description: Sends a heartbeat message if the socket is connected.
    group: client
  - id: realtime.set_auth
    name: Set Auth
    description: Sets the JWT access token used for channel subscription authorization and Realtime RLS.
    group: client
  - id: realtime.subscribe
    name: Subscribe
    description: Subscribe registers your client with the server.
    group: channel
  - id: realtime.teardown
    name: Teardown
    description: Destroys and stops related timers.
    group: channel
  - id: realtime.track
    name: Track
    description: Sends the supplied payload to the presence tracker so other subscribers can see that this client is online. Use to stop broadcasting presence for the same key.
    group: channel
  - id: realtime.unsubscribe
    name: Unsubscribe
    description: Leaves the channel.
    group: channel
  - id: realtime.untrack
    name: Untrack
    description: Removes the current presence state for this client.
    group: channel
  - id: realtime.update_join_payload
    name: Update Join Payload
    description: Updates the payload that will be sent the next time the channel joins (reconnects). Useful for rotating access tokens or updating config without re-creating the channel.
    group: channel

# yaml-language-server: $schema=../schema/capability-matrix.schema.json
area: functions
title: Edge Functions
description: Invoke Supabase Edge Functions from the client with support for streaming, region routing, typed errors, and flexible request configuration.
groups:
  - id: invocation
    title: Invocation
features:
  - id: functions.invocation.invoke
    name: Invoke Function
    description: Call a deployed Edge Function by name with an optional request body.
    group: invocation
  - id: functions.invocation.set_auth_token
    name: Set Auth Token
    description: Update the authorization token sent with all subsequent function invocations.
    group: invocation
  - id: functions.invocation.method_override
    name: HTTP Method Override
    description: Invoke a function using a non-default HTTP method (GET, PUT, PATCH, DELETE) for RESTful Edge Function designs.
    group: invocation
  - id: functions.invocation.streaming_response
    name: Streaming Response (SSE)
    description: Receive a streaming response from a function; when the function returns text/event-stream the raw Response object is passed through for caller-controlled reading.
    group: invocation
  - id: functions.invocation.region_selection
    name: Region Selection
    description: Route an invocation to a specific geographic deployment region set at client construction time or overridden per individual call.
    group: invocation
  - id: functions.invocation.timeout
    name: Invocation Timeout
    description: Abort a function invocation after a specified number of milliseconds using an internally managed AbortController; composable with a caller-supplied AbortSignal.
    group: invocation
  - id: functions.invocation.request_cancellation
    name: Request Cancellation
    description: Cancel an in-flight function invocation at any point before a response is received.
    group: invocation
  - id: functions.invocation.response_type_detection
    name: Automatic Response Type Detection
    description: Parse the function response automatically based on the returned Content-Type header without requiring the caller to specify the expected type.
    group: invocation
  - id: functions.invocation.custom_http_client
    name: Custom HTTP Client
    description: Supply a custom HTTP client implementation at construction time for environment-specific handling or test interception.
    group: invocation
  - id: functions.invocation.typed_errors
    name: Typed Error Classes
    description: Distinguish between network failures (FunctionsFetchError), non-2xx HTTP responses (FunctionsHttpError), and Supabase relay errors (FunctionsRelayError); each carries a context property with the raw Response or underlying cause.
    group: invocation
